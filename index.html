<!DOCTYPE html>
<html>
<head>
    <title>CarGame</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; }
        canvas { display: block; margin-bottom: 10px; border: 2px solid #555; }
        .controls { background: #333; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <canvas id="canva" width="960" height="540"></canvas>
    
    <div class="controls">
        <label>Acceleration: </label>
        <input type="number" id="accelInput" step="10" value="250">
        
        <label>Drift (0-1): </label>
        <input type="number" id="driftInput" step="0.01" min="0" max="1" value="0.99">
        
        <label>drag (0-1): </label>
        <input type="number" id="dragInput" step="0.01" min="0" max="1" value="0.999">

        <button onclick="updateValues()">Apply Physics</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
